# 原生画面获得输入时，保持与 WebView 播放器一致的操作。
SPACE cycle pause
K cycle pause
LEFT seek -5 exact
RIGHT seek 5 exact
J seek -10 exact
L seek 10 exact
0 seek 0 absolute-percent exact
1 seek 10 absolute-percent exact
2 seek 20 absolute-percent exact
3 seek 30 absolute-percent exact
4 seek 40 absolute-percent exact
5 seek 50 absolute-percent exact
6 seek 60 absolute-percent exact
7 seek 70 absolute-percent exact
8 seek 80 absolute-percent exact
9 seek 90 absolute-percent exact
UP script-message infinity-loop-prev
DOWN script-message infinity-loop-next
HOME script-message infinity-loop-first
END script-message infinity-loop-last
F script-message infinity-loop-fullscreen
Ctrl+Alt+c script-message infinity-loop-copy
WHEEL_UP script-message infinity-loop-wheel-up
WHEEL_DOWN script-message infinity-loop-wheel-down
MBTN_LEFT cycle pause
